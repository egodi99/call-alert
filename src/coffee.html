<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'Segoe UI', 'SF Pro Display', system-ui, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: no-drag;
  }

  .border-frame { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
  .border-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    border: 6px solid #6f3d1f;
    box-shadow: inset 0 0 40px rgba(111,61,31,0.3), 0 0 40px rgba(111,61,31,0.2);
    animation: pulse-border 2s ease-in-out infinite;
  }
  @keyframes pulse-border {
    0%,100% { border-color: #6f3d1f; box-shadow: inset 0 0 40px rgba(111,61,31,0.3), 0 0 40px rgba(111,61,31,0.2); }
    50%      { border-color: #a0601a; box-shadow: inset 0 0 70px rgba(160,96,26,0.4), 0 0 70px rgba(160,96,26,0.3); }
  }

  .corner { position: fixed; width: 180px; height: 180px; pointer-events: none; z-index: 2; }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 0; left: 0; }
  .corner-tr { top: 0; right: 0; transform: scaleX(-1); }
  .corner-bl { bottom: 0; left: 0; transform: scaleY(-1); }
  .corner-br { bottom: 0; right: 0; transform: scale(-1); }

  /* Banner */
  .banner {
    position: fixed; top: 0; left: 0; right: 0; height: 80px;
    background: linear-gradient(135deg, rgba(30,15,5,0.93), rgba(50,25,8,0.89));
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 2px solid rgba(111,61,31,0.7);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; z-index: 10;
    animation: slide-down 0.4s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes slide-down {
    from { transform: translateY(-100%); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .banner-left { display: flex; align-items: center; gap: 16px; }
  .icon-coffee {
    width: 44px; height: 44px;
    background: rgba(111,61,31,0.25); border: 2px solid rgba(160,96,26,0.8);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 22px; animation: coffee-pulse 2s ease-in-out infinite;
  }
  @keyframes coffee-pulse {
    0%,100% { background: rgba(111,61,31,0.2); transform: scale(1); }
    50%      { background: rgba(111,61,31,0.4); transform: scale(1.05); }
  }
  .banner-title { color: #f5e6d0; font-size: 22px; font-weight: 700; }
  .banner-subtitle { color: rgba(210,160,100,0.8); font-size: 13px; margin-top: 2px; letter-spacing: 0.5px; text-transform: uppercase; }
  .banner-right { display: flex; align-items: center; gap: 10px; }
  .dismiss-btn {
    background: rgba(255,255,255,0.07); border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 10px; color: rgba(240,220,190,0.8); font-size: 13px; font-weight: 600;
    padding: 8px 16px; cursor: pointer; transition: all 0.2s;
  }
  .dismiss-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }

  /* Tazza centrale */
  .center-stage {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 5; pointer-events: none;
  }
  .cup-wrap { animation: float 3s ease-in-out infinite; }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-12px); }
  }
  .cup-svg { width: 200px; height: 200px; filter: drop-shadow(0 20px 40px rgba(80,40,10,0.5)); }
  .steam { display: flex; justify-content: center; gap: 18px; margin-bottom: 8px; height: 50px; align-items: flex-end; }
  .steam-line { width: 4px; border-radius: 4px; background: linear-gradient(to top, rgba(210,160,80,0.7), transparent); animation: steam-rise 2s ease-in-out infinite; }
  .steam-line:nth-child(1) { height: 30px; animation-delay: 0s; }
  .steam-line:nth-child(2) { height: 44px; animation-delay: 0.4s; }
  .steam-line:nth-child(3) { height: 24px; animation-delay: 0.8s; }
  @keyframes steam-rise {
    0%   { transform: translateY(0) scaleX(1); opacity: 0.8; }
    50%  { transform: translateY(-18px) scaleX(1.4); opacity: 0.4; }
    100% { transform: translateY(-32px) scaleX(0.8); opacity: 0; }
  }
  .center-label { margin-top: 24px; color: rgba(240,210,160,0.9); font-size: 26px; font-weight: 800; text-shadow: 0 2px 20px rgba(0,0,0,0.5); }
  .center-sub { margin-top: 6px; color: rgba(200,160,100,0.6); font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }

  /* RSVP buttons — visibili solo se non hai ancora risposto */
  .rsvp-wrap {
    position: fixed;
    bottom: 130px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 16px; z-index: 20;
    pointer-events: all;
    animation: card-in 0.4s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes card-in {
    from { transform: translateX(-50%) translateY(20px); opacity: 0; }
    to   { transform: translateX(-50%) translateY(0); opacity: 1; }
  }
  .rsvp-btn {
    padding: 14px 32px; border-radius: 14px;
    font-size: 16px; font-weight: 700; cursor: pointer; border: none;
    transition: all 0.2s; letter-spacing: 0.3px;
  }
  .rsvp-yes {
    background: linear-gradient(135deg, #5a8a3a, #4a7a2a);
    color: #fff; box-shadow: 0 4px 20px rgba(80,130,50,0.4);
  }
  .rsvp-yes:hover { background: linear-gradient(135deg, #6aaa48, #5a8a38); transform: translateY(-2px); }
  .rsvp-no {
    background: linear-gradient(135deg, #7a3020, #622010);
    color: #fff; box-shadow: 0 4px 20px rgba(120,50,30,0.4);
  }
  .rsvp-no:hover { background: linear-gradient(135deg, #9a4030, #7a2818); transform: translateY(-2px); }

  /* Panel risposte */
  .rsvp-panel {
    position: fixed; bottom: 32px; right: 32px;
    background: rgba(20,10,3,0.90);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(111,61,31,0.5); border-radius: 16px;
    padding: 16px 20px; min-width: 220px; max-width: 300px;
    z-index: 10; box-shadow: 0 8px 32px rgba(111,61,31,0.2);
    animation: card-in-right 0.35s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes card-in-right {
    from { transform: translateX(40px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  .panel-title {
    color: rgba(210,160,100,0.7); font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
  }
  .rsvp-list { display: flex; flex-direction: column; gap: 8px; }
  .rsvp-row {
    display: flex; align-items: center; gap: 10px;
  }
  .rsvp-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .rsvp-avatar.yes { background: linear-gradient(135deg, #5a8a3a, #4a7a2a); color: #fff; }
  .rsvp-avatar.no  { background: linear-gradient(135deg, #7a3020, #622010); color: #fff; }
  .rsvp-avatar.pending { background: rgba(111,61,31,0.3); color: rgba(210,160,100,0.6); }
  .rsvp-name { color: #f5e6d0; font-size: 14px; font-weight: 600; flex: 1; }
  .rsvp-answer { font-size: 12px; font-weight: 600; }
  .rsvp-answer.yes { color: #7dc857; }
  .rsvp-answer.no  { color: #e06040; }
  .rsvp-answer.pending { color: rgba(200,160,100,0.4); }

  .end-btn {
    width: 100%; margin-top: 14px;
    background: rgba(111,61,31,0.2); border: 1px solid rgba(160,96,26,0.5);
    border-radius: 8px; color: #c8904a; font-size: 13px; font-weight: 600;
    padding: 8px; cursor: pointer; transition: background 0.2s;
  }
  .end-btn:hover { background: rgba(111,61,31,0.4); }
</style>
</head>
<body>

<div class="border-frame"></div>
<div class="corner corner-tl">
  <svg viewBox="0 0 180 180" fill="none"><path d="M0 0 L80 0 L80 6 L6 6 L6 80 L0 80 Z" fill="rgba(111,61,31,0.8)"/><path d="M0 0 L50 0 L50 3 L3 3 L3 50 L0 50 Z" fill="rgba(111,61,31,0.4)"/></svg>
</div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="banner">
  <div class="banner-left">
    <div class="icon-coffee">☕</div>
    <div>
      <div class="banner-title">Pausa caffè!</div>
      <div class="banner-subtitle" id="banner-sub">Qualcuno ti aspetta al caffè</div>
    </div>
  </div>
  <div class="banner-right">
    <button class="dismiss-btn" id="dismiss-btn">Chiudi ✕</button>
  </div>
</div>

<div class="center-stage">
  <div class="cup-wrap">
    <div class="steam">
      <div class="steam-line"></div>
      <div class="steam-line"></div>
      <div class="steam-line"></div>
    </div>
    <svg class="cup-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="100" cy="172" rx="70" ry="10" fill="#3d1f08" opacity="0.7"/>
      <path d="M42 90 Q38 155 100 162 Q162 155 158 90 Z" fill="#5c2e0e"/>
      <path d="M42 90 Q38 155 100 162 Q162 155 158 90 Z" fill="url(#cup-grad)"/>
      <ellipse cx="100" cy="90" rx="58" ry="12" fill="#7a3f18"/>
      <ellipse cx="100" cy="90" rx="52" ry="9" fill="#2a0e02"/>
      <ellipse cx="100" cy="94" rx="48" ry="8" fill="#1a0800" opacity="0.95"/>
      <ellipse cx="88" cy="92" rx="14" ry="4" fill="#3d1500" opacity="0.6" transform="rotate(-15 88 92)"/>
      <path d="M158 105 Q195 105 195 130 Q195 155 158 150" fill="none" stroke="#7a3f18" stroke-width="12" stroke-linecap="round"/>
      <path d="M158 105 Q188 105 188 130 Q188 150 158 150" fill="none" stroke="#5c2e0e" stroke-width="6" stroke-linecap="round"/>
      <path d="M58 100 Q55 130 62 150" stroke="rgba(255,200,150,0.15)" stroke-width="8" stroke-linecap="round" fill="none"/>
      <defs>
        <linearGradient id="cup-grad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="rgba(0,0,0,0.3)"/>
          <stop offset="40%" stop-color="rgba(255,255,255,0.05)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.2)"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="center-label">Pausa caffè ☕</div>
    <div class="center-sub" id="invited-by">Proposta da …</div>
  </div>
</div>

<!-- Bottoni RSVP -->
<div class="rsvp-wrap" id="rsvp-wrap">
  <button class="rsvp-btn rsvp-yes" id="btn-yes">✅ Vengo!</button>
  <button class="rsvp-btn rsvp-no"  id="btn-no">❌ Non posso</button>
</div>

<!-- Panel risposte -->
<div class="rsvp-panel" id="rsvp-panel">
  <div class="panel-title">Risposte</div>
  <div class="rsvp-list" id="rsvp-list"></div>
  <button class="end-btn" id="end-btn" style="display:none">✅ Fine pausa caffè</button>
</div>

<script>
const { ipcRenderer } = require('electron');

let myUsername = '';
let myAnswer = null; // 'yes' | 'no' | null
let currentVolume = 0.7;

function playNotification(volume) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, startAt, duration, gainPeak) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + startAt);
      gain.gain.setValueAtTime(0, ctx.currentTime + startAt);
      gain.gain.linearRampToValueAtTime(gainPeak * volume, ctx.currentTime + startAt + 0.06);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startAt + duration);
      osc.start(ctx.currentTime + startAt);
      osc.stop(ctx.currentTime + startAt + duration);
    }
    playTone(440, 0,    0.7, 0.12);
    playTone(554, 0.25, 0.7, 0.10);
    playTone(659, 0.50, 1.0, 0.08);
    setTimeout(() => ctx.close(), 2000);
  } catch(e) {}
}

function renderRSVP(rsvp, isOwner, invitedBy) {
  const list = document.getElementById('rsvp-list');
  const entries = Object.entries(rsvp);

  if (entries.length === 0) {
    list.innerHTML = '<div style="color:rgba(200,160,100,0.4);font-size:13px">In attesa di risposte…</div>';
  } else {
    list.innerHTML = entries.map(([user, answer]) => `
      <div class="rsvp-row">
        <div class="rsvp-avatar ${answer}">${user[0].toUpperCase()}</div>
        <span class="rsvp-name">${user}</span>
        <span class="rsvp-answer ${answer}">
          ${answer === 'yes' ? '✅ Vengo' : '❌ Non posso'}
        </span>
      </div>
    `).join('');
  }

  // Mostra/nascondi end button
  document.getElementById('end-btn').style.display = isOwner ? 'block' : 'none';

  // Nascondi i bottoni RSVP se hai già risposto o se sei il proponente
  const rsvpWrap = document.getElementById('rsvp-wrap');
  const iAmInviter = myUsername === invitedBy;
  rsvpWrap.style.display = (myAnswer !== null || iAmInviter) ? 'none' : 'flex';
}

ipcRenderer.on('update-coffee', (_, data) => {
  myUsername = data.myUsername;
  if (typeof data.notificationVolume === 'number') currentVolume = data.notificationVolume;
  if (data.forceShow) {
    myAnswer = null;
    playNotification(currentVolume);
  }

  document.getElementById('banner-sub').textContent = `${data.invitedBy || '…'} ti aspetta al caffè`;
  document.getElementById('invited-by').textContent = `Proposta da ${data.invitedBy || '…'}`;

  renderRSVP(data.rsvp || {}, data.isOwner, data.invitedBy);
});

document.getElementById('btn-yes').addEventListener('click', () => {
  myAnswer = 'yes';
  ipcRenderer.send('coffee-rsvp', 'yes');
  document.getElementById('rsvp-wrap').style.display = 'none';
});

document.getElementById('btn-no').addEventListener('click', () => {
  myAnswer = 'no';
  ipcRenderer.send('coffee-rsvp', 'no');
  document.getElementById('rsvp-wrap').style.display = 'none';
});

document.getElementById('dismiss-btn').addEventListener('click', () => {
  ipcRenderer.send('dismiss-coffee');
});

document.getElementById('end-btn').addEventListener('click', () => {
  ipcRenderer.send('end-coffee');
});
</script>
</body>
</html>
