<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'Segoe UI', 'SF Pro Display', system-ui, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: no-drag;
  }

  /* Bordo marrone pulsante */
  .border-frame {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .border-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    border: 6px solid #6f3d1f;
    box-shadow:
      inset 0 0 40px rgba(111,61,31,0.3),
      0 0 40px rgba(111,61,31,0.2);
    animation: pulse-border 2s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%, 100% { border-color: #6f3d1f; box-shadow: inset 0 0 40px rgba(111,61,31,0.3), 0 0 40px rgba(111,61,31,0.2); }
    50%       { border-color: #a0601a; box-shadow: inset 0 0 70px rgba(160,96,26,0.4), 0 0 70px rgba(160,96,26,0.3); }
  }

  /* Corner */
  .corner { position: fixed; width: 180px; height: 180px; pointer-events: none; z-index: 2; }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 0; left: 0; }
  .corner-tr { top: 0; right: 0; transform: scaleX(-1); }
  .corner-bl { bottom: 0; left: 0; transform: scaleY(-1); }
  .corner-br { bottom: 0; right: 0; transform: scale(-1); }

  /* Banner */
  .banner {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(135deg, rgba(30,15,5,0.93) 0%, rgba(50,25,8,0.89) 100%);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 2px solid rgba(111,61,31,0.7);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    z-index: 10;
    animation: slide-down 0.4s cubic-bezier(0.16,1,0.3,1);
  }

  @keyframes slide-down {
    from { transform: translateY(-100%); opacity: 0; }
    to   { transform: translateY(0);     opacity: 1; }
  }

  .banner-left { display: flex; align-items: center; gap: 16px; }

  .icon-coffee {
    width: 44px; height: 44px;
    background: rgba(111,61,31,0.25);
    border: 2px solid rgba(160,96,26,0.8);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    animation: coffee-pulse 2s ease-in-out infinite;
  }

  @keyframes coffee-pulse {
    0%, 100% { background: rgba(111,61,31,0.2); transform: scale(1); }
    50%       { background: rgba(111,61,31,0.4); transform: scale(1.05); }
  }

  .banner-title { color: #f5e6d0; font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .banner-subtitle { color: rgba(210,160,100,0.8); font-size: 13px; margin-top: 2px; letter-spacing: 0.5px; text-transform: uppercase; }

  .banner-right { display: flex; align-items: center; gap: 12px; }

  .dismiss-btn {
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: rgba(240,220,190,0.8);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .dismiss-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }

  /* Tazza centrale */
  .center-stage {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 5;
    pointer-events: none;
  }

  .cup-wrap {
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-12px); }
  }

  /* SVG tazza */
  .cup-svg { width: 220px; height: 220px; filter: drop-shadow(0 20px 40px rgba(80,40,10,0.5)); }

  /* Vapore */
  .steam {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 8px;
    height: 50px;
    align-items: flex-end;
  }

  .steam-line {
    width: 4px;
    border-radius: 4px;
    background: linear-gradient(to top, rgba(210,160,80,0.7), transparent);
    animation: steam-rise 2s ease-in-out infinite;
  }
  .steam-line:nth-child(1) { height: 30px; animation-delay: 0s; }
  .steam-line:nth-child(2) { height: 44px; animation-delay: 0.4s; }
  .steam-line:nth-child(3) { height: 24px; animation-delay: 0.8s; }

  @keyframes steam-rise {
    0%   { transform: translateY(0) scaleX(1); opacity: 0.8; }
    50%  { transform: translateY(-18px) scaleX(1.4); opacity: 0.4; }
    100% { transform: translateY(-32px) scaleX(0.8); opacity: 0; }
  }

  .center-label {
    margin-top: 28px;
    color: rgba(240,210,160,0.9);
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    pointer-events: none;
  }
  .center-sub {
    margin-top: 8px;
    color: rgba(200,160,100,0.6);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Card chi ha lanciato */
  .coffee-card {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: rgba(25,12,4,0.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(111,61,31,0.5);
    border-radius: 14px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 240px;
    z-index: 10;
    animation: card-in 0.35s cubic-bezier(0.16,1,0.3,1) both;
    box-shadow: 0 8px 32px rgba(111,61,31,0.2);
  }

  @keyframes card-in {
    from { transform: translateX(40px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }

  .card-avatar {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #6f3d1f, #a0601a);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: #f5e6d0;
    flex-shrink: 0;
  }
  .card-user { color: #f5e6d0; font-size: 15px; font-weight: 600; }
  .card-meta { color: rgba(210,160,100,0.7); font-size: 12px; margin-top: 2px; }

  .end-btn {
    background: rgba(111,61,31,0.2);
    border: 1px solid rgba(160,96,26,0.5);
    border-radius: 8px;
    color: #c8904a;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
    pointer-events: all;
  }
  .end-btn:hover { background: rgba(111,61,31,0.4); }
</style>
</head>
<body>

<div class="border-frame"></div>

<div class="corner corner-tl">
  <svg viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 0 L80 0 L80 6 L6 6 L6 80 L0 80 Z" fill="rgba(111,61,31,0.8)"/>
    <path d="M0 0 L50 0 L50 3 L3 3 L3 50 L0 50 Z" fill="rgba(111,61,31,0.4)"/>
  </svg>
</div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="banner">
  <div class="banner-left">
    <div class="icon-coffee">☕</div>
    <div>
      <div class="banner-title">Pausa caffè!</div>
      <div class="banner-subtitle" id="banner-sub">Qualcuno ti aspetta al caffè</div>
    </div>
  </div>
  <div class="banner-right">
    <button class="dismiss-btn" id="dismiss-btn">Ho capito ✕</button>
  </div>
</div>

<!-- Tazza centrale -->
<div class="center-stage">
  <div class="cup-wrap">
    <div class="steam">
      <div class="steam-line"></div>
      <div class="steam-line"></div>
      <div class="steam-line"></div>
    </div>
    <svg class="cup-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Piattino -->
      <ellipse cx="100" cy="172" rx="70" ry="10" fill="#3d1f08" opacity="0.7"/>
      <!-- Tazza corpo -->
      <path d="M42 90 Q38 155 100 162 Q162 155 158 90 Z" fill="#5c2e0e"/>
      <path d="M42 90 Q38 155 100 162 Q162 155 158 90 Z" fill="url(#cup-grad)"/>
      <!-- Bordo superiore tazza -->
      <ellipse cx="100" cy="90" rx="58" ry="12" fill="#7a3f18"/>
      <ellipse cx="100" cy="90" rx="52" ry="9" fill="#2a0e02"/>
      <!-- Caffè dentro -->
      <ellipse cx="100" cy="94" rx="48" ry="8" fill="#1a0800" opacity="0.95"/>
      <!-- Riflesso caffè -->
      <ellipse cx="88" cy="92" rx="14" ry="4" fill="#3d1500" opacity="0.6" transform="rotate(-15 88 92)"/>
      <!-- Manico -->
      <path d="M158 105 Q195 105 195 130 Q195 155 158 150" fill="none" stroke="#7a3f18" stroke-width="12" stroke-linecap="round"/>
      <path d="M158 105 Q188 105 188 130 Q188 150 158 150" fill="none" stroke="#5c2e0e" stroke-width="6" stroke-linecap="round"/>
      <!-- Highlight tazza -->
      <path d="M58 100 Q55 130 62 150" stroke="rgba(255,200,150,0.15)" stroke-width="8" stroke-linecap="round" fill="none"/>
      <defs>
        <linearGradient id="cup-grad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="rgba(0,0,0,0.3)"/>
          <stop offset="40%" stop-color="rgba(255,255,255,0.05)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.2)"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="center-label">Pausa caffè ☕</div>
    <div class="center-sub" id="invited-by">Proposta da …</div>
  </div>
</div>

<!-- Card chi ha proposto -->
<div class="coffee-card" id="coffee-card">
  <div class="card-avatar" id="card-avatar">?</div>
  <div>
    <div class="card-user" id="card-user">…</div>
    <div class="card-meta">ha proposto la pausa</div>
  </div>
  <button class="end-btn" id="end-btn" style="display:none">✅ Fine pausa</button>
</div>

<script>
const { ipcRenderer } = require('electron');

function playNotification() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, startAt, duration, gainPeak) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + startAt);
      gain.gain.setValueAtTime(0, ctx.currentTime + startAt);
      gain.gain.linearRampToValueAtTime(gainPeak, ctx.currentTime + startAt + 0.06);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startAt + duration);
      osc.start(ctx.currentTime + startAt);
      osc.stop(ctx.currentTime + startAt + duration);
    }
    // Tre note ascendenti — più calde e morbide della call
    playTone(440, 0,    0.7, 0.12);
    playTone(554, 0.25, 0.7, 0.10);
    playTone(659, 0.50, 1.0, 0.08);
    setTimeout(() => ctx.close(), 2000);
  } catch(e) {}
}

ipcRenderer.on('update-coffee', (_, data) => {
  if (data.forceShow) playNotification();

  document.getElementById('banner-sub').textContent =
    `${data.invitedBy || '…'} ti aspetta al caffè`;
  document.getElementById('invited-by').textContent =
    `Proposta da ${data.invitedBy || '…'}`;
  document.getElementById('card-user').textContent = data.invitedBy || '…';
  document.getElementById('card-avatar').textContent =
    (data.invitedBy || '?')[0].toUpperCase();

  const endBtn = document.getElementById('end-btn');
  endBtn.style.display = data.isOwner ? 'block' : 'none';
});

document.getElementById('dismiss-btn').addEventListener('click', () => {
  ipcRenderer.send('dismiss-coffee');
});

document.getElementById('end-btn').addEventListener('click', () => {
  ipcRenderer.send('end-coffee');
});
</script>
</body>
</html>
